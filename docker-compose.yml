version: '3'
services:
  frontend:
    image: doguhannilt/weirdstore-frontend:latest  
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - backend
  backend:
    image: doguhannilt/weirdstore-backend:latest  
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"